    const RAW_MENUS = [

          { id: 'kasJimpitan', label: 'Arus Kas Jimpitan' },

        ]
      },
      {

        subMenus: [
          { id: 'kasRonda', label: 'Arus Kas Ronda' },
          { id: 'tagihanRonda', label: 'Checklist Tagihan' }
        ]
      },
      { id: 'saving', label: 'Dana Saving', icon: Landmark },
      { 
        id: 'menu_agenda', label: 'Agenda & Pengumuman', icon: Calendar,
        subMenus: [
          { id: 'agenda', label: 'Daftar Agenda' },
          { id: 'pemberitahuanTagihan', label: 'Pemberitahuan Tagihan' }
        ]
      },
      { id: 'notulen', label: 'Notulen Rapat', icon: FileText },
      { id: 'inventaris', label: 'Inventaris', icon: Package },
      { id: 'settings', label: 'Pengaturan Web', icon: Settings },
    ];

    const colors = {
      blue: { primary: 'bg-blue-600 hover:bg-blue-700', text: 'text-blue-600', soft: 'bg-blue-50/50', border: 'border-blue-100' },
      emerald: { primary: 'bg-emerald-600 hover:bg-emerald-700', text: 'text-emerald-600', soft: 'bg-emerald-50/50', border: 'border-emerald-100' },
      indigo: { primary: 'bg-indigo-600 hover:bg-indigo-700', text: 'text-indigo-600', soft: 'bg-indigo-50/50', border: 'border-indigo-100' },
      amber: { primary: 'bg-amber-600 hover:bg-amber-700', text: 'text-amber-600', soft: 'bg-amber-50/50', border: 'border-amber-100' },
      rose: { primary: 'bg-rose-600 hover:bg-rose-700', text: 'text-rose-600', soft: 'bg-rose-50/50', border: 'border-rose-100' },
    };

    const WARGA_USER = { id: 0, name: 'Warga Publik', username: 'warga', role: ROLES.WARGA, allowedMenus: [] };

    const initialData = {
      users: [
        {
          id: 1,
          name: 'Superadmin',
          username: 'superadmin',
          password: '123',
          role: ROLES.SUPER_ADMIN,
          allowedMenus: RAW_MENUS.map(m => m.id)
        }
      ],
      warga: [],
      kasIuran: [],
      kasJimpitan: [],
      kasRonda: [],
      saving: [],
      agenda: [],
      notulen: [],
      inventaris: [],
      tagihanIuran: {},
      tagihanJimpitan: {},
      tagihanRonda: {},
      settings: { 
        namaBlok: '', 
        tagline: '',
        nominalIuran: 50000,
        nominalJimpitan: 1000,
        nominalRonda: 25000, 
        ttdKetua: 'Ketua Pengurus',
        ttdBendahara: 'Bendahara Kas',
        themeColor: 'indigo',
        darkMode: false,
        logoWeb: '',
        logoLogin: '',
        menuLabels: {}
      }
    };

    // --- FUNGSI HELPER GLOBAL ---

    // Helper Tanggal ke format DD-MM-YYYY
    const formatDate = (dateStr) => {
      if (!dateStr) return '';
      if (typeof dateStr === 'string' && dateStr.includes('T')) {
        const d = new Date(dateStr);
        if (!isNaN(d)) {
          const year = d.getFullYear();
          const month = String(d.getMonth() + 1).padStart(2, '0');
          const day = String(d.getDate()).padStart(2, '0');
          return `${day}-${month}-${year}`;
        }
      }
      if (typeof dateStr === 'string' && dateStr.match(/^\d{4}-\d{2}-\d{2}$/)) {
        const parts = dateStr.split('-');
        return `${parts[2]}-${parts[1]}-${parts[0]}`;
      }
      return dateStr;
    };

    // Helper Waktu (menghilangkan timezone aneh Google Sheet)
    const formatTime = (timeStr) => {
      if (!timeStr) return '';
      if (typeof timeStr === 'string' && timeStr.includes('T')) {
        const d = new Date(timeStr);
        if (!isNaN(d)) {
          const hours = String(d.getHours()).padStart(2, '0');
          const minutes = String(d.getMinutes()).padStart(2, '0');
          return `${hours}:${minutes}`;
        }
      }
      return timeStr;
    };

    // Helper Tanggal Form Input (Input date butuh format YYYY-MM-DD)
    const getRawDateForInput = (dateStr) => {
      if (!dateStr) return '';
      if (typeof dateStr === 'string' && dateStr.includes('T')) {
         const d = new Date(dateStr);
         if (!isNaN(d)) {
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
         }
      }
      if (typeof dateStr === 'string' && dateStr.match(/^\d{2}-\d{2}-\d{4}$/)) {
         const parts = dateStr.split('-');
         return `${parts[2]}-${parts[1]}-${parts[0]}`;
      }
      return dateStr;
    };

    const getRawTimeForInput = (timeStr) => {
      if (!timeStr) return '';
      if (typeof timeStr === 'string' && timeStr.includes('T')) {
         const d = new Date(timeStr);
         if (!isNaN(d)) {
            const hours = String(d.getHours()).padStart(2, '0');
            const minutes = String(d.getMinutes()).padStart(2, '0');
            return `${hours}:${minutes}`;
         }
      }
      return timeStr;
    };

    const formatRupiah = (angka) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(Number(angka) || 0);
    const hitungSaldo = (transaksi) => (Array.isArray(transaksi) ? transaksi : []).reduce((tot, item) => item.jenis === 'Pemasukan' ? tot + Number(item.nominal) : tot - Number(item.nominal), 0);

    const getDaysInMonth = (monthStr, year) => {
      const monthIdx = bulanListGlobal.indexOf(monthStr);
      return new Date(year, monthIdx + 1, 0).getDate();
    };

    // EXCEL EXPORT - Dengan Header, Grid (Kotak), dan Format Lengkap
    const exportToXLS = (title, columns, data, appData, moduleName) => {
      let tableHTML = `<html xmlns:o="urn:schemas-microsoft-com:office:office" xmlns:x="urn:schemas-microsoft-com:office:excel" xmlns="http://www.w3.org/TR/REC-html40">
      <head>
        <meta charset="utf-8" />
        <style>
          table { border-collapse: collapse; width: 100%; font-family: Arial, sans-serif; }
          th, td { border: 1px solid black; padding: 6px; text-align: left; }
          th { background-color: #d1d5db; font-weight: bold; }
        </style>
      </head>
      <body>`;
      tableHTML += `<h2>${title}</h2>`;
      tableHTML += `<table><thead><tr>`;
      columns.forEach(c => { tableHTML += `<th>${c.label}</th>`; });
      tableHTML += `</tr></thead><tbody>`;
      data.forEach(row => {
        tableHTML += `<tr>`;
        columns.forEach(c => {
          let val = row[c.key] !== undefined && row[c.key] !== null ? row[c.key] : '';
          if (c.key === 'tanggal' || c.key === 'tglLahir') val = formatDate(val);
          if (c.key === 'waktu') val = formatTime(val);
          if (c.key === 'nominal' || c.key === 'saldo') val = formatRupiah(val);
          tableHTML += `<td>${val}</td>`;
        });
        tableHTML += `</tr>`;
      });
      tableHTML += `</tbody>`;

      if (appData) {
          let ttdBendaharaLabel = "Penanggung Jawab / Bendahara";
          let ttdBendaharaName = "___________________";

          if (moduleName === 'kasIuran' || moduleName === 'tagihanIuran') {
            ttdBendaharaLabel = "Bendahara Kas Iuran";
            ttdBendaharaName = appData.settings?.ttdIuran || '___________________';
          } else if (moduleName === 'kasJimpitan' || moduleName === 'tagihanJimpitan') {
            ttdBendaharaLabel = "Bendahara Kas Jimpitan";
            ttdBendaharaName = appData.settings?.ttdJimpitan || '___________________';
          } else if (moduleName === 'kasRonda' || moduleName === 'tagihanRonda') {
            ttdBendaharaLabel = "Koordinator Keamanan";
            ttdBendaharaName = appData.settings?.ttdRonda || '___________________';
          } else if (moduleName === 'saving') {
            ttdBendaharaLabel = "Bendahara Dana Saving";
            ttdBendaharaName = appData.settings?.ttdSaving || '___________________';
          } else if (moduleName === 'inventaris') {
            ttdBendaharaLabel = "Seksi Perlengkapan / Inventaris";
            ttdBendaharaName = appData.settings?.ttdInventaris || '___________________';
          }

          tableHTML += `<tfoot>
            <tr><td colspan="${columns.length}" style="height: 40px; border: none;"></td></tr>
            <tr>
              <td colspan="${Math.ceil(columns.length / 2)}" style="text-align: center; border: none;">
                Mengetahui,<br/>Ketua Blok GHIJL<br/><br/><br/><br/><b>${appData.settings?.ttdKetua || '___________________'}</b>
              </td>
              <td colspan="${Math.floor(columns.length / 2)}" style="text-align: center; border: none;">
                ${new Date().toLocaleDateString('id-ID', {day:'numeric', month:'long', year:'numeric'})}<br/>${ttdBendaharaLabel}<br/><br/><br/><br/><b>${ttdBendaharaName}</b>
              </td>
            </tr>
          </tfoot>`;
      }

      tableHTML += `</table></body></html>`;

      const blob = new Blob([tableHTML], { type: 'application/vnd.ms-excel' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `${title.toLowerCase().replace(/\s+/g, '_')}_laporan.xls`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
    };

    // --- KOMPONEN PRESENTASI & UI ---
    
    // FOOTER CETAK (Dinamic Berdasarkan Menu)
    const PrintFooter = ({ appData, moduleName }) => {
      let ttdBendaharaLabel = "Penanggung Jawab / Bendahara";
      let ttdBendaharaName = "___________________";

      if (moduleName === 'kasIuran' || moduleName === 'tagihanIuran') {

          </div>
        </div>
      );
    };

    const CustomDialog = ({ dialog, closeDialog }) => {
      if (!dialog.isOpen) return null;
      return (
        <div className="fixed inset-0 z-[150] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-fade-in">
          <div className="bg-white dark:bg-slate-800 w-full max-w-sm rounded-3xl shadow-2xl overflow-hidden border border-slate-200 dark:border-slate-700 p-6">
            <div className="flex items-center gap-3 mb-4">
              {dialog.type === 'alert' ? <AlertTriangle className="w-6 h-6 text-amber-500"/> : <Info className="w-6 h-6 text-blue-500"/>}

            <p className="text-sm text-slate-600 dark:text-slate-300 mb-6">{dialog.message}</p>

                {dialog.type === 'alert' ? 'Mengerti' : 'Ya, Lanjutkan'}

            </div>
          </div>
        </div>
      );
    };

    const SyncStatusWidget = ({ apiUrl, isSyncing }) => {
      if (!apiUrl) return (
        <div className="hidden md:flex items-center gap-1.5 text-xs font-semibold text-rose-500 bg-rose-50 dark:bg-rose-900/30 px-3 py-1.5 rounded-full border border-rose-200 dark:border-rose-800 shadow-sm" title="URL Google Apps Script belum disetel. Data hanya tersimpan di perangkat ini.">

      if (isSyncing) return (

    const ClockWidget = ({ currentTime }) => (
      <div className="hidden md:flex items-center gap-2 text-xs font-semibold text-slate-600 dark:text-slate-300 bg-white dark:bg-slate-800 px-4 py-2 rounded-full border border-slate-200 dark:border-slate-700 shadow-sm">

        <span className="font-bold text-indigo-600 dark:text-indigo-400">{currentTime.toLocaleTimeString('id-ID')} WIB</span>
      </div>

    const Widget = ({ title, value, icon: Icon, bgClass, textClass }) => (
      <div className="bg-white dark:bg-slate-800 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 p-5 flex items-center transition-all hover:shadow-md hover:-translate-y-1">

        <div>
          <p className="text-[11px] text-slate-500 dark:text-slate-400 font-bold uppercase tracking-wider">{title}</p>
          <p className="text-xl font-extrabold text-slate-800 dark:text-slate-100 mt-1">{value}</p>
        </div>
      </div>
    );

    const DetailModal = ({ selectedItemDetail, setSelectedItemDetail, appData, handleShareAgenda, handleShareNotulen }) => {
      if (!selectedItemDetail) return null;
      const isAgenda = !!selectedItemDetail.jenisAgenda;
      return (
        <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
          <div className={`w-full w-11/12 max-w-lg md:max-w-xl rounded-2xl p-5 md:p-6 shadow-2xl transition-all max-h-[85vh] overflow-y-auto ${appData.settings?.darkMode ? 'bg-slate-800 text-slate-100' : 'bg-white text-slate-800'}`}>
            <div className="flex justify-between items-start border-b border-slate-200 dark:border-slate-700 pb-4 mb-4">
              <h3 className="text-xl font-bold">{isAgenda ? 'Detail Agenda & Pengumuman' : 'Detail Notulen Hasil Rapat'}</h3>
              <button onClick={() => setSelectedItemDetail(null)} className="p-1 rounded-full hover:bg-slate-100 dark:hover:bg-slate-700"><X className="w-5 h-5" /></button>
            </div>
            <div className="space-y-4">
              <div>
                <p className="text-xs text-slate-400 uppercase font-semibold">{isAgenda ? 'Perihal / Judul' : 'Agenda Rapat'}</p>
                <p className="text-lg font-bold mt-0.5">{isAgenda ? selectedItemDetail.jenisAgenda : selectedItemDetail.rapat}</p>
              </div>

      const sortedLedger = [...ledger].sort((a, b) => {
         const dateA = new Date(a.tanggal).getTime();
         const dateB = new Date(b.tanggal).getTime();
         if (dateA === dateB) return (a.id || 0) - (b.id || 0);
         return dateA - dateB;

      const [tempUrl, setTempUrl] = useState(apiUrl);

      const getLabel = (id, def) => appData.settings?.menuLabels?.[id] || def;
      const updateMenuLabel = (id, value) => { handleSaveData('settings', { ...(appData.settings || {}), menuLabels: { ...(appData.settings?.menuLabels || {}), [id]: value } }); };

      const handleCreateAccount = (e) => {
        e.preventDefault();
        if((Array.isArray(appData.users) ? appData.users : []).find(u => u.username === newAccount.username)) {
          return openDialog('alert', 'Pendaftaran Gagal', 'Username tersebut sudah dipakai, pilih yang lain!');
        }
        const roleToSet = newAccount.role || ROLES.ADMIN_KAS;
        handleSaveData('users', [...(Array.isArray(appData.users) ? appData.users : []), { ...newAccount, role: roleToSet, id: Date.now() }]);
        setNewAccount({ name: '', username: '', password: '', role: ROLES.ADMIN_KAS, allowedMenus: [] });
        openDialog('alert', 'Sukses', 'Akun Admin berhasil ditambahkan!');
      };

      const handleLogoUpload = (e, key) => {
        const file = e.target.files[0];
        if (file) {
          const reader = new FileReader();
          reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
              const canvas = document.createElement('canvas');
              const MAX_WIDTH = 250;
              const MAX_HEIGHT = 250;
              let width = img.width;
              let height = img.height;

              if (width > height) {
                if (width > MAX_WIDTH) { height *= MAX_WIDTH / width; width = MAX_WIDTH; }
              } else {
                if (height > MAX_HEIGHT) { width *= MAX_HEIGHT / height; height = MAX_HEIGHT; }
              }
              
              canvas.width = width;
              canvas.height = height;
              const ctx = canvas.getContext('2d');
              ctx.drawImage(img, 0, 0, width, height);
              const dataUrl = canvas.toDataURL('image/png', 0.9);
              handleSaveData('settings', { ...(appData.settings || {}), [key]: dataUrl });
            };
            img.src = event.target.result;
          };

    const PemberitahuanTagihan = ({ appData }) => {
      const [selectedBulan, setSelectedBulan] = useState('jan');
      const [selectedTahun, setSelectedTahun] = useState('2026');

      const targetMonthIdx = bulanListGlobal.indexOf(selectedBulan);

      const rekapWarga = (Array.isArray(appData.warga) ? appData.warga : []).map(w => {
        let detailTagihan = [];
        let total = 0;

        // Looping akumulasi dari Jan s/d Bulan Terpilih
        for (let i = 0; i <= targetMonthIdx; i++) {
           const b = bulanListGlobal[i];
           const iuranPaid = appData.tagihanIuran?.[selectedTahun]?.[w.idWarga]?.[b];
           const jimpitanPaid = appData.tagihanJimpitan?.[selectedTahun]?.[w.idWarga]?.[b];
           const rondaStatus = appData.tagihanRonda?.[selectedTahun]?.[w.idWarga]?.[b];

           if (!iuranPaid) {
             const nom = Number(appData.settings?.nominalIuran) || 0;
             detailTagihan.push({ nama: `Iuran (${b.toUpperCase()})`, nominal: nom });
             total += nom;
           }
           if (!jimpitanPaid) {
             const nom = (Number(appData.settings?.nominalJimpitan) || 0) * getDaysInMonth(b, selectedTahun);
             detailTagihan.push({ nama: `Jimpitan (${b.toUpperCase()})`, nominal: nom });
             total += nom;
           }
           if (rondaStatus && !rondaStatus.lunas) {
             const denda = Number(rondaStatus.nominal) || 0;
             const bayar = Number(rondaStatus.dibayar) || 0;
             const sisa = denda - bayar;
             if (sisa > 0) {
                detailTagihan.push({ nama: `Denda Ronda (${b.toUpperCase()})`, nominal: sisa });
                total += sisa;
             }
           }

        return { warga: w, detail: detailTagihan, total };

              <div key={index} className="flex flex-col md:flex-row justify-between items-start md:items-center p-4 rounded-2xl border dark:border-slate-700 bg-slate-50/50">

                  <h4 className="font-extrabold text-sm text-slate-800 dark:text-slate-100">{item.warga.nama} <span className="text-xs font-bold text-indigo-600">({item.warga.idBlok || item.warga.blok})</span></h4>
                  <div className="text-xs text-slate-500 mt-1.5 space-y-0.5 max-h-24 overflow-y-auto">

    function App() {
      const [currentUser, setCurrentUser] = useState(() => {

          }

          console.warn("Failed to restore user session");
        }

      });
      
      const [currentView, setCurrentView] = useState('dashboard');
      const [isSidebarOpen, setIsSidebarOpen] = useState(false);
      const [expandedMenuId, setExpandedMenuId] = useState('');
      
      const [appData, setAppData] = useState(() => {
        try {
          const savedData = localStorage.getItem('SISTEM_WARGA_DATA');
          if (savedData) return JSON.parse(savedData);
        } catch (e) {
          console.warn("Failed to restore app data");
        }
        return initialData;

      const [showLoginModal, setShowLoginModal] = useState(false);

      const [currentTime, setCurrentTime] = useState(new Date());
      const [dialog, setDialog] = useState({ isOpen: false, type: '', title: '', message: '', onConfirm: null });

      // Cloud Sync Status
      const DEFAULT_API_URL = 'https://script.google.com/macros/s/AKfycbyP54KsmSafoVJAauWss01eriAjvSApZZgp0W8XMfyQ5eNLxXdl8AjaEv7x3AHlpOFewQ/exec';
      const [apiUrl, setApiUrl] = useState(() => {
        try {
          return localStorage.getItem('API_URL') || DEFAULT_API_URL;
        } catch(e) {
          return DEFAULT_API_URL;
        }
      });
      const [isSyncing, setIsSyncing] = useState(false);

      useEffect(() => {
        try {
          if (!localStorage.getItem('API_URL')) {
            localStorage.setItem('API_URL', DEFAULT_API_URL);
          }
        } catch (e) {}
      }, []);

      const [isModalOpen, setIsModalOpen] = useState(false);
      const [modalType, setModalType] = useState('');
      const [formData, setFormData] = useState({});

      const closeDialog = () => setDialog({ isOpen: false, type: '', title: '', message: '', onConfirm: null });

      useEffect(() => {
        if (appData.settings?.darkMode) document.documentElement.classList.add('dark');
        else document.documentElement.classList.remove('dark');
      }, [appData.settings?.darkMode]);

      useEffect(() => {
        // Hapus preloader seketika saat komponen dimuat
        const loader = document.getElementById('root')?.querySelector('div[style*="MEMUAT APLIKASI"]');
        if (loader) {
            loader.style.opacity = '0';
            setTimeout(() => loader.style.display = 'none', 300);
        } else {
            const preloaderAlt = document.getElementById('app-preloader');
            if (preloaderAlt) {
                preloaderAlt.style.opacity = '0';
                setTimeout(() => preloaderAlt.remove(), 300);
            }
        }

        const timer = setInterval(() => setCurrentTime(new Date()), 1000);
        return () => clearInterval(timer);
      }, []);

      useEffect(() => {
        try {
          if (currentUser.role !== ROLES.WARGA) {
            const userStr = JSON.stringify(currentUser);
            localStorage.setItem('SISTEM_WARGA_USER', userStr);
            document.cookie = `SISTEM_WARGA_USER=${encodeURIComponent(userStr)}; max-age=31536000; path=/; SameSite=Lax`;
          } else {
            localStorage.removeItem('SISTEM_WARGA_USER');
            document.cookie = `SISTEM_WARGA_USER=; max-age=0; path=/; SameSite=Lax`;
          }
        } catch (e) {}
      }, [currentUser]);

      const fetchFromCloud = async (url) => {
        if (!url) return;
        setIsSyncing(true);
        try {
          // Google Apps Script membutuhkan waktu hingga 15 detik pada Cold Start.
          const controller = new AbortController();
          const timeoutId = setTimeout(() => controller.abort(), 45000); 
          
          const res = await fetch(url, { signal: controller.signal });
          clearTimeout(timeoutId);
          
          const text = await res.text();
          try {
            const result = JSON.parse(text);
            if (result.status === 'success' && result.data) {
               setAppData(prev => {
                 const merged = { ...prev, ...result.data };
                 try {
                   localStorage.setItem('SISTEM_WARGA_DATA', JSON.stringify(merged));
                 } catch (e) {
                   console.warn("Storage quota exceeded, could not save to localStorage.", e);
                 }
                 return merged;
               });
            }
          } catch (jsonErr) {
            console.error('Gagal membaca JSON dari Google Apps Script.', text.substring(0, 100));
          }
        } catch (err) {
          console.error('Failed fetching data from GAS:', err);
        } finally {
          setIsSyncing(false);
        }
      };

      useEffect(() => {
        if (apiUrl) fetchFromCloud(apiUrl);
      }, [apiUrl]);

      const handleSaveData = async (moduleName, newData) => {
        // 1. Local Update (Seketika UI Berubah)
        setAppData(prev => {
          const updatedData = { ...prev, [moduleName]: newData };
          try {
            localStorage.setItem('SISTEM_WARGA_DATA', JSON.stringify(updatedData));
          } catch(e) {
            console.warn("Penyimpanan memori penuh (Quota Exceeded)", e);
          }
          return updatedData;
        });

        // 2. Tembak ke Google Spreadsheet
        if (apiUrl) {
          setIsSyncing(true);
          try {
            await fetch(apiUrl, {
              method: 'POST',
              mode: 'no-cors',
              headers: { 'Content-Type': 'text/plain;charset=utf-8' },
              body: JSON.stringify({ action: 'save', module: moduleName, data: newData })
            });
          } catch (err) {
            console.error('Failed sending to cloud:', err);
          }
          setTimeout(() => setIsSyncing(false), 800);
        }
      };

      const activeTheme = colors[appData.settings?.themeColor] || colors.indigo;
      const isPublic = currentUser.role === ROLES.WARGA;

            localStorage.setItem('SISTEM_WARGA_USER', JSON.stringify(user));

          setShowLoginModal(false);

        setFormData({});
      };

      const handleDeleteItem = (type, identifier) => {
        openDialog('confirm', 'Konfirmasi Hapus', 'Data yang dihapus tidak dapat dikembalikan. Yakin?', () => {
          const filtered = (Array.isArray(appData[type]) ? appData[type] : []).filter(item => (item.id || item.idWarga) !== identifier);
          handleSaveData(type, filtered);
        });
      };

      const toggleTagihanManual = (moduleName, idWarga, bulan, tahun, nominalTagihan) => {
        if (moduleName === 'tagihanRonda') {
          const status = appData[moduleName]?.[tahun]?.[idWarga]?.[bulan];
          setConfirmTagihan({ moduleName, idWarga, bulan, tahun, isRonda: true, statusRonda: status });
        } else {
          const isLunas = appData[moduleName]?.[tahun]?.[idWarga]?.[bulan];
          setConfirmTagihan({ moduleName, idWarga, bulan, tahun, isLunas, nominalTagihan });
        }
      };

      const handleConfirmTagihanSubmit = () => {
        const { moduleName, idWarga, bulan, tahun, isLunas, nominalTagihan } = confirmTagihan;
        const newData = { ...(appData[moduleName] || {}) };
        if (!newData[tahun]) newData[tahun] = {};
        if (!newData[tahun][idWarga]) newData[tahun][idWarga] = {};
        
        newData[tahun][idWarga][bulan] = isLunas ? null : formatDate(new Date().toISOString());
        
        handleSaveData(moduleName, newData);
        setConfirmTagihan(null);
      };

      const handleConfirmRonda = (nominal, action) => {
        const { idWarga, bulan, tahun, statusRonda } = confirmTagihan;
        const newData = { ...(appData.tagihanRonda || {}) };
        if (!newData[tahun]) newData[tahun] = {};
        if (!newData[tahun][idWarga]) newData[tahun][idWarga] = {};

        if (action === 'delete') {
           delete newData[tahun][idWarga][bulan];
        } else if (action === 'set') {
           newData[tahun][idWarga][bulan] = {
              nominal: Number(nominal),
              dibayar: 0,
              lunas: false,
              tglBayar: null
           };
        } else if (action === 'pay') {
           const bayar = Number(nominal);
           const denda = Number(statusRonda.nominal) || 0;
           const sudahDibayarLama = Number(statusRonda.dibayar) || 0;
           const totalDibayar = sudahDibayarLama + bayar;
           const isLunas = totalDibayar >= denda;

           newData[tahun][idWarga][bulan] = {
              ...statusRonda,
              dibayar: totalDibayar,
              lunas: isLunas,
              tglBayar: formatDate(new Date().toISOString())
           };
        } else if (action === 'cancel_lunas') {
           newData[tahun][idWarga][bulan] = {
              ...statusRonda,
              dibayar: 0,
              lunas: false,
              tglBayar: null
           };
        }
        
        handleSaveData('tagihanRonda', newData);
        setConfirmTagihan(null);
      };

      const renderTagihanDialogContent = () => {
        if (!confirmTagihan) return null;
        
        if (confirmTagihan.isRonda) {
          if (!confirmTagihan.statusRonda) {
            return (
              <React.Fragment>
                <div className="flex items-center gap-3 mb-4">
                  <AlertTriangle className="w-6 h-6 text-amber-500"/>
                  <h3 className="text-lg font-bold">Tetapkan Denda Ronda</h3>
                </div>
                <p className="text-xs text-slate-500 mb-2">Bulan {confirmTagihan.bulan.toUpperCase()} {confirmTagihan.tahun}</p>
                <input type="number" id="inputDendaRonda" defaultValue={appData.settings?.nominalRonda} className="w-full p-3 border rounded-xl dark:bg-slate-900 dark:border-slate-700 text-sm mb-6 outline-none focus:ring-2 focus:ring-indigo-500 font-bold" />
                <div className="flex justify-end gap-2">
                  <button onClick={() => setConfirmTagihan(null)} className="px-4 py-2 bg-slate-100 dark:bg-slate-700 rounded-lg text-sm font-semibold">Batal</button>
                  <button onClick={() => handleConfirmRonda(document.getElementById('inputDendaRonda').value, 'set')} className="px-4 py-2 bg-amber-500 text-white rounded-lg text-sm font-semibold">Simpan Denda</button>
                </div>
              </React.Fragment>
            );
          } else if (!confirmTagihan.statusRonda.lunas) {
            const denda = Number(confirmTagihan.statusRonda.nominal) || 0;
            const sudahDibayar = Number(confirmTagihan.statusRonda.dibayar) || 0;
            const sisa = denda - sudahDibayar;
            return (
              <React.Fragment>
                <div className="flex items-center gap-3 mb-4">
                  <Wallet className="w-6 h-6 text-blue-500"/>
                  <h3 className="text-lg font-bold">Pembayaran Denda</h3>
                </div>
                <div className="text-sm font-medium text-slate-600 dark:text-slate-300 mb-4 bg-slate-50 dark:bg-slate-900 p-3 rounded-lg border border-slate-200 dark:border-slate-700">
                  <div className="flex justify-between mb-1"><span>Total Denda:</span> <span className="font-bold">{formatRupiah(denda)}</span></div>
                  <div className="flex justify-between mb-1"><span>Telah Dibayar:</span> <span className="font-bold text-emerald-600">{formatRupiah(sudahDibayar)}</span></div>
                  <div className="flex justify-between pt-1 mt-1 border-t border-slate-200 dark:border-slate-600"><span>Sisa Tunggakan:</span> <span className="font-bold text-rose-500">{formatRupiah(sisa)}</span></div>
                </div>
                <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1">Nominal Pembayaran (Bisa Dicicil)</label>
                <input type="number" id="inputBayarRonda" defaultValue={sisa} max={sisa} className="w-full p-3 border rounded-xl dark:bg-slate-900 dark:border-slate-700 text-sm mb-4 outline-none focus:ring-2 focus:ring-indigo-500 font-bold" />
                <div className="flex flex-col gap-2">
                  <button onClick={() => {
                    const val = document.getElementById('inputBayarRonda').value;
                    handleConfirmRonda(val, 'pay');
                  }} className="w-full py-2.5 bg-emerald-500 hover:bg-emerald-600 text-white rounded-xl text-sm font-bold shadow-md">Simpan Pembayaran</button>
                  <button onClick={() => handleConfirmRonda(null, 'delete')} className="w-full py-2.5 bg-rose-50 hover:bg-rose-100 text-rose-600 rounded-xl text-sm font-bold">Hapus Ketetapan Denda</button>
                  <button onClick={() => setConfirmTagihan(null)} className="w-full py-2 text-slate-500 text-sm font-semibold mt-1">Batal</button>
                </div>
              </React.Fragment>
            );
          } else {
            return (
              <React.Fragment>
                <div className="flex items-center gap-3 mb-4">
                  <Info className="w-6 h-6 text-blue-500"/>
                  <h3 className="text-lg font-bold">Denda Sudah Lunas</h3>
                </div>
                <p className="text-sm text-slate-500 dark:text-slate-400 mt-2 mb-6">Apakah Anda ingin membatalkan status lunas ini?</p>
                <div className="flex justify-end gap-2">
                  <button onClick={() => setConfirmTagihan(null)} className="px-4 py-2 bg-slate-100 dark:bg-slate-700 rounded-lg text-sm font-semibold">Tutup</button>
                  <button onClick={() => handleConfirmRonda(null, 'cancel_lunas')} className="px-4 py-2 bg-rose-500 text-white rounded-lg text-sm font-semibold">Batalkan Lunas</button>
                </div>
              </React.Fragment>
            );
          }
        } else {
          return (
            <React.Fragment>
              <h3 className="text-lg font-bold">Ubah Status Tagihan</h3>
              <p className="text-sm text-slate-500 dark:text-slate-400 mt-2">Apakah Anda yakin ingin menandai {confirmTagihan.moduleName.includes('Iuran') ? 'Iuran' : 'Jimpitan'} bulan ini sebagai <span className="font-bold text-slate-800 dark:text-slate-200">{confirmTagihan.isLunas ? 'Belum Lunas' : 'Lunas'}</span>?</p>
              <div className="flex justify-end gap-2 mt-6">
                <button onClick={() => setConfirmTagihan(null)} className="px-4 py-2 bg-slate-100 hover:bg-slate-200 dark:bg-slate-700 dark:hover:bg-slate-600 rounded-lg text-sm font-semibold">Batal</button>
                <button onClick={handleConfirmTagihanSubmit} className="px-4 py-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-lg text-sm font-semibold">Ya, Ubah Status</button>
              </div>
            </React.Fragment>
          );
        }
      };

      const renderViewContent = () => {
        switch (currentView) {
          case 'dashboard': return <Dashboard appData={appData} getMenuLabel={getMenuLabel} isPublic={isPublic} openFormModal={openFormModal} setSelectedItemDetail={setSelectedItemDetail} handleShareAgenda={handleShareAgendaAppLevel} handleShareNotulen={handleShareNotulenAppLevel} />;
          case 'warga': return <DataManager title="Data Kependudukan Warga" moduleName="warga" data={Array.isArray(appData.warga) ? appData.warga : []} appData={appData} handleSaveData={handleSaveData} currentUser={currentUser} activeTheme={activeTheme} openFormModal={openFormModal} handleDeleteItem={handleDeleteItem} columns={[{ key: 'idBlok', label: 'ID Blok' }, { key: 'nik', label: 'NIK' }, { key: 'nama', label: 'Nama Lengkap' }, { key: 'statusWarga', label: 'Status' }, { key: 'blok', label: 'Blok' }, { key: 'noHp', label: 'No WA' }]} />;

          case 'saving': return <BukuArusKas title={getMenuLabel('saving', 'Dana Saving')} moduleName="saving" appData={appData} activeTheme={activeTheme} currentUser={currentUser} openFormModal={openFormModal} handleDeleteItem={handleDeleteItem} />;
          case 'agenda': return <DataManager title="Daftar Agenda & Pengumuman" moduleName="agenda" data={Array.isArray(appData.agenda) ? appData.agenda : []} appData={appData} handleSaveData={handleSaveData} currentUser={currentUser} activeTheme={activeTheme} openFormModal={openFormModal} handleDeleteItem={handleDeleteItem} onShareWA={handleShareAgendaAppLevel} columns={[{ key: 'jenisAgenda', label: 'Jenis' }, { key: 'judul', label: 'Perihal' }, { key: 'deskripsi', label: 'Isi', type: 'textarea' }, { key: 'tanggal', label: 'Tanggal' }, { key: 'waktu', label: 'Waktu' }, { key: 'tempat', label: 'Tempat' }]} />;
          case 'pemberitahuanTagihan': return <PemberitahuanTagihan appData={appData} />;
          case 'notulen': return <DataManager title="Notulen Hasil Rapat Warga" moduleName="notulen" data={Array.isArray(appData.notulen) ? appData.notulen : []} appData={appData} handleSaveData={handleSaveData} currentUser={currentUser} activeTheme={activeTheme} openFormModal={openFormModal} handleDeleteItem={handleDeleteItem} onShareWA={handleShareNotulenAppLevel} columns={[{ key: 'rapat', label: 'Agenda Rapat' }, { key: 'tanggal', label: 'Tanggal' }, { key: 'waktu', label: 'Waktu' }, { key: 'tempat', label: 'Tempat' }, { key: 'jumlahHadir', label: 'Jml Hadir' }, { key: 'hasil', label: 'Hasil' }, { key: 'notulis', label: 'Notulis' }, { key: 'ketua', label: 'Ketua' }]} />;
          case 'inventaris': return <DataManager title="Daftar Inventaris Lingkungan" moduleName="inventaris" data={Array.isArray(appData.inventaris) ? appData.inventaris : []} appData={appData} handleSaveData={handleSaveData} currentUser={currentUser} activeTheme={activeTheme} openFormModal={openFormModal} handleDeleteItem={handleDeleteItem} columns={[{ key: 'nama', label: 'Nama Aset' }, { key: 'jumlah', label: 'Jml Unit' }, { key: 'kondisi', label: 'Kondisi' }, { key: 'lokasi', label: 'Lokasi' }, { key: 'petugas', label: 'Petugas' }, { key: 'ketua', label: 'Ketua' }]} />;
          case 'settings': return <SettingsPanel appData={appData} handleSaveData={handleSaveData} currentUser={currentUser} activeTheme={activeTheme} apiUrl={apiUrl} setApiUrl={setApiUrl} openDialog={openDialog} />;
          default: return <Dashboard appData={appData} getMenuLabel={getMenuLabel} isPublic={isPublic} openFormModal={openFormModal} setSelectedItemDetail={setSelectedItemDetail} handleShareAgenda={handleShareAgendaAppLevel} handleShareNotulen={handleShareNotulenAppLevel} />;
        }
      };

      const renderMenusList = RAW_MENUS.map(m => ({
        ...m,
        label: getMenuLabel(m.id, m.label),
        subMenus: m.subMenus ? m.subMenus.map(sub => ({ ...sub, label: getMenuLabel(sub.id, sub.label) })) : null
      })).filter(menu => {
        if (currentUser.role === ROLES.SUPER_ADMIN) return true;
        const allowed = Array.isArray(currentUser.allowedMenus) ? currentUser.allowedMenus : [];
        return allowed.includes(menu.id);
      });

      if (isPublic) {
        return (
          <div className={`min-h-screen font-sans ${appData.settings?.darkMode ? 'bg-slate-900 text-slate-100' : 'bg-slate-50 text-slate-800'}`}>
            <CustomDialog dialog={dialog} closeDialog={closeDialog} />
            
            {/* PUBLIC PORTAL HEADER */}
            <header className={`sticky top-0 z-40 backdrop-blur-xl border-b ${appData.settings?.darkMode ? 'bg-slate-900/70 border-slate-800' : 'bg-white/70 border-slate-200/50'} shadow-sm print:hidden`}>
              <div className="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between min-h-[70px]">
                <div className="flex items-center gap-3">
                  {appData.settings?.logoWeb && (
                    <div className="h-10 w-10 md:h-12 md:w-12 bg-transparent flex items-center justify-center shrink-0">
                      <img src={appData.settings?.logoWeb} alt="Logo" className="max-h-full max-w-full object-contain mix-blend-multiply dark:mix-blend-normal" />
                    </div>
                  )}
                  <div className="flex flex-col justify-center">
                    <span className="font-extrabold text-base md:text-xl tracking-tight text-slate-900 dark:text-white leading-tight">
                      {appData.settings?.namaBlok}
                    </span>
                    {appData.settings?.tagline && (
                      <span className="text-[10px] md:text-xs font-semibold text-slate-500 dark:text-slate-400 mt-0.5 leading-tight">{appData.settings?.tagline}</span>
                    )}
                  </div>
                </div>
                
                {/* Live Clock & Login Trigger */}
                <div className="flex items-center gap-3 md:gap-4 shrink-0">
                  <ClockWidget currentTime={currentTime} />
                  <button onClick={() => setShowLoginModal(true)} className="flex items-center text-xs md:text-sm font-bold bg-gradient-to-r from-indigo-600 to-blue-600 text-white px-4 py-2 md:px-5 md:py-2.5 rounded-full transition-all shadow-md hover:shadow-lg transform hover:-translate-y-0.5">
                    <Lock className="w-3.5 h-3.5 mr-1.5 hidden md:block" /> Login
                  </button>
                </div>
              </div>
            </header>

            {/* HERO SECTION */}
            <div className={`py-12 md:py-16 px-4 bg-gradient-to-br ${appData.settings?.darkMode ? 'from-slate-900 via-slate-800 to-slate-900' : 'from-indigo-50/50 via-white to-blue-50/50'} border-b border-slate-100 relative overflow-hidden print:hidden`}>
              <div className="absolute top-0 right-0 -mr-20 -mt-20 w-96 h-96 bg-indigo-400/10 rounded-full blur-3xl"></div>
              <div className="absolute bottom-0 left-0 -ml-20 -mb-20 w-96 h-96 bg-blue-400/10 rounded-full blur-3xl"></div>
              
              <div className="max-w-4xl mx-auto text-center relative z-10">
                <h1 className="text-3xl sm:text-5xl font-extrabold mb-5 text-slate-800 dark:text-white tracking-tight leading-tight">Portal Transparansi Layanan Kas & Agenda</h1>
                <p className="text-slate-500 dark:text-slate-400 text-sm md:text-base leading-relaxed max-w-2xl mx-auto">Selamat datang! Website ini dikelola secara terbuka oleh jajaran pengurus untuk memberikan transparansi iuran kas berkala, denda ronda, dana saving, agenda kegiatan, serta arsip notulensi rapat lingkungan.</p>
              </div>
            </div>

            {/* MAIN LANDING CONTENT */}
            <main className="max-w-6xl mx-auto p-4 md:p-6 py-10 print:p-0">
              <Dashboard appData={appData} getMenuLabel={getMenuLabel} isPublic={isPublic} openFormModal={openFormModal} setSelectedItemDetail={setSelectedItemDetail} handleShareAgenda={handleShareAgendaAppLevel} handleShareNotulen={handleShareNotulenAppLevel} />
            </main>

            <DetailModal selectedItemDetail={selectedItemDetail} setSelectedItemDetail={setSelectedItemDetail} appData={appData} handleShareAgenda={handleShareAgendaAppLevel} handleShareNotulen={handleShareNotulenAppLevel} />

            {/* ABSOLUTE MODAL LOGIN PANEL */}
            {showLoginModal && (
              <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-md animate-fade-in print:hidden">
                <div className="bg-white dark:bg-slate-800 w-full max-w-sm rounded-3xl shadow-2xl overflow-hidden border border-slate-200 dark:border-slate-700 transform transition-all scale-100">
                  <div className="p-6 md:p-8 text-center">
                    {appData.settings?.logoLogin && (
                      <div className="h-16 md:h-20 w-auto mx-auto bg-transparent flex items-center justify-center mb-5 p-1">
                        <img src={appData.settings?.logoLogin} alt="Login Logo" className="max-w-full max-h-full object-contain mix-blend-multiply dark:mix-blend-normal" />
                      </div>
                    )}
                    <h2 className="text-xl md:text-2xl font-extrabold text-slate-800 dark:text-white mb-1">Panel Pengurus</h2>
                    <p className="text-sm text-slate-500 mb-8">Masukkan username dan password pengurus.</p>
                    <form onSubmit={handleLoginSubmit} className="space-y-4">
                      <input type="text" required value={loginForm.username} onChange={e => setLoginForm({...loginForm, username: e.target.value})} className="w-full px-4 py-3.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 text-sm outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Username" />
                      <input type="password" required value={loginForm.password} onChange={e => setLoginForm({...loginForm, password: e.target.value})} className="w-full px-4 py-3.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 text-sm outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Password" />

                    </form>
                  </div>
                  <button onClick={() => setShowLoginModal(false)} className="w-full py-4 bg-slate-50 dark:bg-slate-900/50 text-sm font-bold text-slate-500 hover:text-slate-800 border-t transition-colors">Kembali ke Publik</button>

      return (

          <CustomDialog dialog={dialog} closeDialog={closeDialog} />

          {/* SIDEBAR ADMIN PANEL */}
          <div className={`fixed inset-y-0 left-0 z-40 w-72 bg-slate-950 text-slate-300 transform transition-transform duration-300 lg:translate-x-0 lg:static flex flex-col print:hidden ${isSidebarOpen ? 'translate-x-0' : '-translate-x-full'}`}>
            <div className="flex items-center gap-3 py-4 px-6 bg-slate-950 text-white border-b border-slate-900 min-h-[70px]">
              {appData.settings?.logoWeb && (
                <div className="h-8 w-8 bg-transparent flex items-center justify-center shrink-0">
                  <img src={appData.settings?.logoWeb} className="max-h-full max-w-full object-contain" alt="Logo"/>

              )}
              <div className="flex flex-col justify-center overflow-hidden">
                <span className="text-sm font-bold truncate tracking-wide text-white leading-tight">{appData.settings?.namaBlok}</span>

              </div>
            </div>
            
            <div className="flex-1 overflow-y-auto py-4">
              <ul className="space-y-1 px-3">
                {renderMenusList.map(menu => (
                  <li key={menu.id}>
                    {menu.subMenus ? (
